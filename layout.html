<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Espace Utilisateur - Mini Projet JavaScript</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ================= HEADER SECTION ================= -->
  <header class="app-header">
    <div class="logo">
      <span class="badge">JS</span>
      <span>Mini-Projet</span>
    </div>
    <div class="user-zone">
      <span id="userFullName">Utilisateur</span>
      <button class="btn-logout" id="logoutBtn">Se Deconnecter</button>
    </div>
  </header>

  <!-- ================= NAVIGATION BAR (horizontale) ================= -->
  <nav class="app-nav">
    <ul id="navBarMenu"></ul>
  </nav>

  <div class="app-body">
    <!-- ================= INDEX (menu vertical) ================= -->
    <aside class="app-index">
      <ul id="indexMenu"></ul>
    </aside>

    <!-- ================= CONTENT SECTION ================= -->
    <main class="app-content" id="contentSection">
      <!-- Le contenu des pages est injecte ici en JS -->
    </main>
  </div>

  <!-- ================= FOOTER SECTION ================= -->
  <footer class="app-footer">
    <div class="address">
      &#128205; Institut Specialise de Technologie Appliquee Hay Salam, Sale, Maroc
    </div>
    <div class="social">
      <a href="#" title="Facebook">&#128077;</a>
      <a href="#" title="Instagram">&#128247;</a>
      <a href="#" title="LinkedIn">&#128188;</a>
      <a href="#" title="Twitter/X">&#128038;</a>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
