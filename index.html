<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion - Mini Projet JavaScript</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1>&#128272; CONNEXION</h1>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" required autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>

      <div class="checkbox-field">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Se rappeler de moi</label>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">LOGIN</button>

      <ul class="error-list" id="errorList"></ul>
    </form>

    <div class="auth-links">
      Not registered? <a href="createAccount.html">Create an account</a>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
